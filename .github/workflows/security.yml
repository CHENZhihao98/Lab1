name: "Free DevSecOps — Security Pipeline"

on: [push, pull_request]

jobs:

  # ─── JOB 1 ── Gitleaks ───────────────────────────────────────────────────────
  # Objectif : détecter les secrets commités dans le code source
  # Documentation : https://github.com/gitleaks/gitleaks-action
  gitleaks:
    name: "1 — Secrets (Gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # Récupère tout l'historique git (obligatoire pour Gitleaks)

      # TODO : ajouter l'action Gitleaks ici
      # Bonne pratique : passer GITHUB_TOKEN en variable d'environnement
      # Action disponible sur : gitleaks/gitleaks-action@v2


