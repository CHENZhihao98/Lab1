name: Security CI

on: [push, pull_request]

jobs:
  secret-scan:
    name: "1 - Scan de secrets (gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    name: "2 - SAST (Semgrep)"
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: semgrep --config "p/python" --config "p/security-audit" --error .

  dependency-scan:
    name: "3 - Dependances (pip-audit)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pip-audit
      - run: pip-audit -r requirements.txt

  image-scan:
    name: "4 - Scan d'image conteneur (Trivy)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t vuln-shop:ci .
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: vuln-shop:ci
          exit-code: "1"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
