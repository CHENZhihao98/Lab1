name: "Détection de secrets — Gitleaks"

on: [push, pull_request]

jobs:
  gitleaks:
    name: "Gitleaks — Scan secrets"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
